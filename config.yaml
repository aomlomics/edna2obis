# edna2obis Configuration File
# This is an example of a config file for a FAIRe NOAA / ODE Formatted dataset
# USERS: Please edit the config.yaml file, not this one. This is just a template.
# Here, you specify where all of your data is, set a few other parameters, and set parameters related to the taxonomic assignment.

# ================================STEP 1========================================
# --- OPTIONAL: Specify a path to a different config file for the run ---
# If you want to use a config file other than this default 'config.yaml',
# you can specify its path here. The pipeline will then load that file.
# If left blank or set to 'config.yaml', this file will be used.
run_config_path: "config.yaml"
metadata_format: "NOAA"  # "NOAA" or "GENERIC". NOAA format has separate analysisMetadata sheets. GENERIC format has analysis data within projectMetadata.
edna2obis_run_name: "EXAMPLE_OUTPUT_NOAA_OER_OKEANOS" # This name will be used to name your config file (outputted for your convenience after your run is complete)
# This name will also be used to name your HTML report and Taxa assignment INFO files.

# ================================STEP 2========================================
# Metadata source: true = You have one Excel file, with all your metadata as seperate sheets in the same Excel file. 
# false = You have separate TSV files, one for each metadata sheet.
# Set to true or false; you can keep both sets of paths below, only the selected one is read (based on combined_metadata_file: true or false)
combined_metadata_file: false

# When combined_metadata_file: true = single Excel file and sheet names
sampleMetadata: "sampleMetadata"
experimentRunMetadata: "experimentRunMetadata"
projectMetadata: "projectMetadata"
excel_file: "raw-v3/clement_testing/FAIRe-NOAA_noaa-oer-okeanos.xlsx"

# When combined_metadata_file: false = separate TSV files (one path per sheet)
sampleMetadata_file: "raw-v3/FAIRe_NOAA_example_dataset_large/FAIRe_FAIRe-NOAA_noaa-oer-okeanos-sampleMetadata.tsv"
experimentRunMetadata_file: "raw-v3/FAIRe_NOAA_example_dataset_large/FAIRe_FAIRe-NOAA_noaa-oer-okeanos-experimentRunMetadata.tsv"
projectMetadata_file: "raw-v3/FAIRe_NOAA_example_dataset_large/FAIRe_FAIRe-NOAA_noaa-oer-okeanos-projectMetadata.tsv"

# ================================STEP 3========================================
# Assign pathnames for your raw data. Each analysis must have 2 raw data files associated with it.
# For NOAA format with TSV analysisMetadata files, also include 'analysisMetadata_file' for each run.
# If your metadata sheets are all in the same Excel file, you do NOT need to include 'analysisMetadata_file' for each run.
datafiles:
  OKEX2107part_18S_naive_bayes_pr2_v5.0.0_18Sv4_20251113:
    assay_name: "Eukarya-18S-V4-Stoeck-Piredda"
    taxonomy_file: "raw-v3/FAIRe_NOAA_example_dataset_large/Cruise_OKEX2107/03_OKEX2107part_18S_naive-bayes_pr2_v5.0.0_20251113-filtered_asv_taxa_features.tsv"
    occurrence_file: "raw-v3/FAIRe_NOAA_example_dataset_large/Cruise_OKEX2107/02_OKEX2107part_18S_18Sv4_20251112-filtered_table.tsv"
    analysisMetadata_file: "raw-v3/FAIRe_NOAA_example_dataset_large/Cruise_OKEX2107/analysisMetadata_OKEX2107part_18S_naive-bayes_pr2_v5.0.0_20251113.tsv"
  EX2206_18S_naive_bayes_pr2_v5.0.0_18Sv4_20251113:
    assay_name: "Eukarya-18S-V4-Stoeck-Piredda"
    taxonomy_file: "raw-v3/FAIRe_NOAA_example_dataset_large/Cruise_OKEX2206/03_EX2206_18S_naive-bayes_pr2_v5.0.0_20251113-filtered_asv_taxa_features.tsv"
    occurrence_file: "raw-v3/FAIRe_NOAA_example_dataset_large/Cruise_OKEX2206/02_EX2206_18S_18Sv4_20251112-filtered_table.tsv"
    analysisMetadata_file: "raw-v3/FAIRe_NOAA_example_dataset_large/Cruise_OKEX2206/analysisMetadata_EX2206_18S_naive-bayes_pr2_v5.0.0_20251113.tsv"
  OKEX2203_CTD_COI_naive_bayes_rcrux_CO1_no_NA_insect_amphib_uniq_20250626:
    assay_name: "Metazoa-COI-Leray-Geller"
    taxonomy_file: "raw-v3/FAIRe_NOAA_example_dataset_large/Cruise_OKEX2203/03_OKEX2203_CTD_COI_merged_rcrux_CO1_no_NA_insect_amphib_uniq-filtered_asv_taxa_features.tsv"
    occurrence_file: "raw-v3/FAIRe_NOAA_example_dataset_large/Cruise_OKEX2203/02_OKEX2203_CTD_COI_20250505-filtered_table.tsv"
    analysisMetadata_file: "raw-v3/FAIRe_NOAA_example_dataset_large/Cruise_OKEX2203/analysisMetadata_OKEX2203_CTD_COI_merged_rcrux_CO1_no_NA_insect_amphib_uniq_20250514.tsv"
  OKEX2301_ROV-D2_12S_naive_bayes_rc_12S_efc_KSfilt-addSI-addMF-derepU_20251103:
    assay_name: "Fish-12S-MiFish-U-Miya"
    taxonomy_file: "raw-v3/FAIRe_NOAA_example_dataset_large/Cruise_OKEX2301/03_OKEX2301_ROV-D2_12S_naive-bayes_rc_12S_efc_KSfilt-addSI-addMF-derepU_20251103-filtered_asv_taxa_features.tsv"
    occurrence_file: "raw-v3/FAIRe_NOAA_example_dataset_large/Cruise_OKEX2301/02_OKEX2301_ROV-D2_12S_20251103-filtered_table.tsv"
    analysisMetadata_file: "raw-v3/FAIRe_NOAA_example_dataset_large/Cruise_OKEX2301/analysisMetadata_OKEX2301_ROV-D2_12S_naive-bayes_rc_12S_efc_KSfilt-addSI-addMF-derepU_20251103.tsv"
  OKEX2301_ROV-D2_18S_naive_bayes_rcrux-18Sv9_20251113:
    assay_name: "Eukarya-18S-V9-Lane-Medlin"
    taxonomy_file: "raw-v3/FAIRe_NOAA_example_dataset_large/Cruise_OKEX2301/03_OKEX2301_ROV-D2_18S_naive-bayes_rcrux-18Sv9_20251113-filtered_asv_taxa_features.tsv"
    occurrence_file: "raw-v3/FAIRe_NOAA_example_dataset_large/Cruise_OKEX2301/02_OKEX2301_ROV-D2_18S_18Sv9_20251112-filtered_table.tsv"
    analysisMetadata_file: "raw-v3/FAIRe_NOAA_example_dataset_large/Cruise_OKEX2301/analysisMetadata_OKEX2301_ROV-D2_18S_naive-bayes_rcrux-18Sv9_20251113.tsv"

  # Add other analysis runs here, following the pattern:
  # your_analysis_run_name:
  #   assay_name: "your_assay_name_from_projectMetadata_column"
  #   taxonomy_file: "path/to/your/asvTaxaFeatures_your_analysis_run_name.tsv"
  #   occurrence_file: "path/to/your/table_your_analysis_run_name.tsv"
  #   analysisMetadata_file: "path/to/analysisMetadata_your_analysis_run_name.tsv" 


# ================================STEP 4========================================
# Sample filtering configuration
# Control sample detection - specify the column to check and which values indicate control samples
control_sample_detection:
  column_name: "samp_category"  # Column name to check for control indicators
  control_values:               # List of values in that column that indicate control samples
    - "negative control"
    - "positive control"

# ================================STEP 5========================================
# The pipeline will construct the Darwin Core 'locationID' based on the following priority:
# 1. It will first look for a column literally named 'locationID' in your sampleMetadata. If found, it will be used directly.
# 2. If not found, it will use the list of columns you define below to create a compound ID (e.g., columnA_columnB).
# 3. If this section is missing or empty, it will default to combining 'line_id' and 'station_id'.
locationID_components:
  - station_id
  - line_id

# -----------------------------------------------------------------------------
# Taxonomic Assignment Parameters
# -----------------------------------------------------------------------------

# ================================STEP 6========================================
# Specify which API you would like to use to assign taxonomy. Options are either WoRMS or GBIF
# Taxonomic Assignment Parameters:
# taxonomic_api_source: "GBIF"
taxonomic_api_source: "WoRMS"

# Define the maximum number of matches to request from the GBIF API for each unique taxonomy string.
# A higher number may provide more potential matches for review but will SIGNIFICANTLY increase processing time.
gbif_match_limit: 3

# ================================STEP 7========================================
# Define which assays should not consider 'species' rank in their taxonomic assignment.
# This is because certain assays (for example, 16S) species' level assignments are not useful / correct.
# Additionally, for example, 18S species' level assignments are good, and we want them!
# This should be the exact 'assay_name' value as found in your analysisMetadata sheets (cell D3)
# and subsequently in the 'assay_name' column of the intermediate occurrence.csv
assays_to_skip_species_match:
  # - "ssu16sv4v5-emp"  # Example, replace with your actual assay names, comment out if you want species-level to be used in taxonomic assignment
  # - "another_16s_assay_name_if_any"

# ================================STEP 8========================================
# WoRMS walk-up matching controls (WoRMS only)
# When a low-level token has WoRMS hits but none are consistent with the provided lineage,
# the matcher can walk up to higher-level tokens until it finds an acceptable match.
#
# Minimum number of lineage tokens that must overlap with the chosen WoRMS classification.
# DONT SET ANY HIGHER THAN 1 for the majority of cases.
worms_min_ranks_matched: 1
# Maximum number of upward steps from the lowest token to try (0 = only lowest token).
worms_max_walkup_steps: 6
# When false, WoRMS name matching is limited to marine taxa only.
# When true, edna2obis requests all WoRMS matches, including non-marine taxa.
worms_return_all_matches: true

# When WoRMS resolves an unaccepted name to an accepted one, the unaccepted match is always shown as an extra row in taxa_assignment_INFO.
# If true, that unaccepted row's assignment score is considered when choosing the selected match for the occurrence core; if false (default), only accepted-name rows can be selected.
worms_consider_unaccepted_for_selection: false

# When true, adds Darwin Core's higherClassification column to outputs. This field is used to show the full WoRMS taxonomic
# lineage for each taxon (including intermediate ranks like Subphlyum, Infraphylum, etc.). Enabling this parameter will
# significantly increase the runtime, because it requires extra WoRMS classification lookups,
# so leave it as 'false' unless you really need it. higherClassification is a Darwin Core field, compatible on both OBIS and GBIF submissions.
worms_return_higher_classification: false

# Optional local reference database (WoRMS only) - speeds up matching significantly!
use_local_reference_database: false  # or false  
local_reference_database_path: "raw-v3/pr2_version_5.0.0_taxonomy.xlsx"

# Optional parameters (will use defaults if not specified)
# Number of processes for matching (0 means use all available CPUs)
worms_n_proc: 0
gbif_n_proc: 0

# Output directory (will be created if it doesn't exist)
# Works on both WoRMS and GBIF taxonomic assignment options
output_dir: "processed-v3/"

# ================================STEP 9========================================
# OPTIONAL output files
# -----------------------------------------------------------------------------
# OPTIONAL Output Files: eMoF (extended measurement or fact), and EML (Ecological Metadata Language)
# Data for these files must be manually entered in their respective input files:
# eMoF: raw-v3/eMoF Fields edna2obis .xlsx
# EML: EML_config.yaml
# -----------------------------------------------------------------------------
# Enable/disable eMoF creation. Set to true to get an eMoF, false to skip eMoF output.
emof_enabled: true
emof_template_path: "raw-v3/FAIRe_NOAA_example_dataset_large/noaa-oer-okeanos_eMoF_Fields_edna2obis.tsv"
# Optional: path to the eMoF template Excel. If not provided, defaults to raw-v3/eMoF_Fields_edna2obis.xlsx

# Enable/disable EML creation. Set to true to generate EML XML file, false to skip.
# EML metadata configuration is stored in a separate file (see eml_config_path below)
eml_enabled: true
eml_config_path: "raw-v3/FAIRe_NOAA_example_dataset_large/noaa-oer-okeanos_EML_config.yaml"

# ================================STEP 10========================================
# OPTIONAL - Split output files by cruise/expedition (short_name)
# -----------------------------------------------------------------------------
# If your sampleMetadata contains a 'short_name' column (cruise/expedition codes),
# you can split the final output files into separate subfolders per short_name.
# This is useful when databases require cruise-by-cruise submissions connected by a parent project.
# 
# When enabled:
#   - Creates subfolders: {output_dir}/{short_name}/
#   - Saves filtered files with suffix: occurrence_core_{api}_{short_name}.csv
#   - Splits: occurrence_core, dna_derived_extension, eMoF, eml.xml
#   - Does NOT split: HTML report, taxa_assignment_INFO
#
# IMPORTANT: If enabled, ALL samples in sampleMetadata MUST have a short_name value.
#            Missing values will cause an error.
#
# Naming convention (recommended): each short_name should START WITH your project_id — the same
# value as the projectMetadata `project_id` field (Darwin Core datasetID). That keeps the first
# segment of occurrenceID aligned with your project namespace when splitting is enabled.
# When split_output_by_short_name is false, occurrenceID always uses project_id for that segment
# (short_name is not used in occurrenceID).
split_output_by_short_name: true

# When true, writes a plain-text run timing / size report next to other outputs (edna2obis_run_performance_*.txt).
include_performance_metrics_in_output: false