# FAIRe NOAA example large bundle: five analysis runs, four sampleMetadata short_name values.
# Full walkthrough: EML_config.yaml at repo root (same Quick guide).
#
# 1) Contact info — two supported styles:
#    • From contacts.yaml: reads contact info from contacts.yaml (in the repo root).
#      You can use the key (lastname_firstname) to pull that person's contact info, and you can list them: [lastname_firstname, last_name_firstname2]
#      Keys are yours to choose; lastname_firstname is a readable convention only.
#    • MANUAL: keep the nested blocks under eml_metadata (individual_name, email,
#      organization_name, …) and fill in the info manually. No contacts file required.
#
# 2) Cruise splits — same as EML_config.yaml quick guide item 2. Below,
#    per_short_name_overrides is filled in: each top-level key is a cruise id from the
#    data; under it, fields mirror eml_metadata (title, abstract, geographic_coverage, …).
#    The template file shows a commented empty example you can copy from.
#
# 3) geographic_coverage — shared “all cruises” box below; tighter boxes per cruise are
#    under per_short_name_overrides. See EML_config.yaml for auto-fill from lat/lon columns.
# -----------------------------------------------------------------------------

eml_metadata:
