  methods:
    method_steps:
      - description: |
          DNA was extracted from seawater filters, amplified by PCR for 18S, COI, and 12S metabarcoding markers, sequenced on Illumina, and analyzed with the Tourmaline 2 pipeline. Field sampling design and detailed procedures are described under sampling; bioinformatic QC and filtering are described under quality control.
    study_extent: |
      Seawater samples in this large example bundle come from four NOAA Ship Okeanos Explorer expeditions with FAIRe sample metadata: EX2107 (Windows to the Deep 2021, Southeast U.S., October–November 2021), EX2203 (2022 Puerto Rico Mapping and Deep-Sea Camera Demonstration, April 2022), EX2206 (Voyage to the Ridge 2022 Expedition 3, August–September 2022), and EX2301 (2023 Shakedown + EXPRESS West Coast Exploration, April 2023). Samples were collected during ROV and CTD work. Adjust this text if you add or remove cruises from the bundle.
    sampling_description: |
      Seawater samples were collected aboard NOAA Ship Okeanos Explorer during ROV dives and CTD casts. Water was drawn from Niskin bottles mounted on either the Deep Discoverer ROV or a CTD rosette. Standard collection volumes were 1.7 L for water samples and 2.0 L for distilled water blanks. Samples were filtered through 0.45 um or 0.22 um membrane filters. Sample and environmental metadata - including dive or CTD cast ID, date, time, location, in-situ measurements (salinity, temperature, dissolved oxygen), and estimated bottom depth - were recorded electronically and transferred to the Sample Operator User Portal (SOUP). Laboratory procedures followed documented protocols (https://github.com/aomlomics/protocols). DNA was extracted from filters and amplified by PCR targeting three metabarcoding markers: 18S rRNA (protists/eukaryotes), COI (metazoa), and 12S rRNA (fish). Sequencing was performed on the Illumina NextSeq platform at the NOAA National Systematics Laboratory. Bioinformatic processing was performed on the Northern Gulf Institute's Orion computing cluster using the Tourmaline 2 pipeline. Steps included adapter trimming and quality filtering (Cutadapt), denoising and representative sequence determination (DADA2), and taxonomic assignment using a naive Bayes classifier and consensus VSEARCH (QIIME 2). Raw sequence data in FASTQ format were submitted to the NCBI Sequence Read Archive (SRA). FAIRe-formatted sample metadata were submitted to NCBI BioSample. Taxonomic occurrence data were formatted for submission to OBIS.
    quality_control: |
      Quality control measures were implemented across all stages of the workflow. During sample collection, laboratory errors and deviations from standard operating procedures (NOAA Ocean Exploration eDNA Sample Workflow, Revision 2.3) were recorded per sample in a physical notebook and transferred to the Sample Operator User Portal (SOUP). Negative controls (distilled water blanks, extraction blanks, PCR blanks, and sequencing blanks) were included throughout sampling and processing to monitor for contamination. Control samples were excluded from the final published dataset but are archived in NCBI SRA and BioSample records for transparency. Raw sequence data were processed using the Tourmaline 2 pipeline. Low-quality bases and adapters were trimmed using Cutadapt, and sequences were denoised using DADA2 to generate representative sequences. Taxonomic assignments were made using a naive Bayes classifier and consensus VSEARCH, with confidence thresholds applied to ensure reliable identifications. Post-assignment filters were applied to remove sequences associated with domestic or human taxa (Bovidae, Suidae, Felidae, Canidae, Primates, Homo sapiens), unresolved assignments (Unassigned), and terrestrial organisms as flagged by WoRMS habitat classifications.

