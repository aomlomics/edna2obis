  purpose: |
    This dataset serves two purposes. First, to advance alignment among researchers and stakeholders on making NOAA Ocean Exploration eDNA data publicly available and interpretable, and to identify and address challenges in achieving that goal. Second, to characterize biodiversity in sampled ocean environments using eDNA metabarcoding data from NOAA Ship Okeanos Explorer expeditions, with emphasis on deep-sea communities in the abyssal zone (depths below 4,000 m).

