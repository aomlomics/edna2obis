eml_metadata:
  # Basic Dataset Information
  title: "NOAA Ocean Exploration seawater eDNA metabarcoding"
  abstract: |
    The mission of NOAA Ocean Exploration is to explore the ocean for national benefit, including discovery and characterization of deep-sea environments and biodiversity. This dataset contains preliminary environmental DNA (eDNA) metabarcoding data from seawater collected aboard NOAA Ship Okeanos Explorer, operated by NOAA Ocean Exploration, across six expeditions from October 2021 to April 2023 (EX2107, EX2201, EX2203, EX2205, EX2206, EX2301). Sampling spanned the Atlantic Ocean (Southeast U.S. continental margin, Gulf of America, Puerto Rico and the West Atlantic including the Puerto Rico Trench, and the Central North Atlantic near the Azores) and the Pacific Ocean (U.S. West Coast). Seawater samples were collected using Niskin bottles deployed on the ROV Deep Discoverer and on CTD rosette casts, covering epipelagic to bathypelagic depths (approximately 3 m to 6,000 m). Metabarcoding targets include the 12S rRNA gene (fish), 18S rRNA gene (protists/eukaryotes), and COI gene (metazoa). Sample archiving and management, wet lab processing, and sequencing were conducted by the Smithsonian National Museum of Natural History and the NOAA National Systematics Laboratory. DNA sequence analysis was performed by the NOAA Atlantic Oceanographic and Meteorological Laboratory.
  
