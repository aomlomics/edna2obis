  gbif_resource_citation: >-
    Coclet C, Thompson L, Miller N, Marranzino A, Green J, Kline L, Collins A, Auscavitz S ({pub_year}). {title}. Version {resource_version}. NOAA Ocean Exploration. Occurrence dataset. https://ipt-obis.gbif.us/resource?r={short_name}&v={resource_version}

  title: "NOAA Ocean Exploration seawater eDNA metabarcoding"
  abstract: |
    The mission of NOAA Ocean Exploration is to explore the ocean for national benefit, including discovery and characterization of deep-sea environments and biodiversity. This package (FAIRe NOAA example large bundle) contains preliminary environmental DNA (eDNA) metabarcoding data from seawater collected aboard NOAA Ship Okeanos Explorer on four expeditions: EX2107 (Southeast U.S.), EX2203 (Puerto Rico / West Atlantic), EX2206 (Voyage to the Ridge), and EX2301 (U.S. West Coast). Seawater samples were collected using Niskin bottles on the ROV Deep Discoverer and CTD casts. Metabarcoding targets in this subset include 18S, COI, and 12S markers as represented in the included assay tables. Sample archiving and management, wet lab processing, and sequencing were conducted by the Smithsonian National Museum of Natural History and the NOAA National Systematics Laboratory. DNA sequence analysis was performed by the NOAA Atlantic Oceanographic and Meteorological Laboratory.

