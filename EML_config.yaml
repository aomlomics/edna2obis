# -----------------------------------------------------------------------------
# EML (Ecological Metadata Language) Configuration
# -----------------------------------------------------------------------------
# Configure metadata for generating EML XML files for OBIS/GBIF submission
# Fill out as much information as possible for better dataset discoverability
#
# Leaving a field blank (very common):
#   Single-line / short text — use empty quotes:  key: ""
#   Repeatable list — use an empty list and add nothing:  key: []  (no "-" lines until you have entries)
#   Multi-line block (key: | …) — for "nothing extra," use  key: ""  on one line instead of |; if you keep |, the indented lines are the value (replace placeholder text when you fill it in)
#   Nested blocks (address:, collection:) — leave each unused subfield as  ""
#
# YAML shapes used in this file (same rules are repeated next to each field):
#   Nested block (e.g. address:) — fixed keys underneath; no "-" on those key lines.
#   Repeatable list — starts as []. Each real item begins with "- " (dash space); commented examples show that shape.
#   Live lists (keywords) — already written as "- item:" blocks; add more by copying a full block.
#   Multi-line text — key: | then indented lines. Do not leave plain text lines under [].

eml_metadata:
  # Basic Dataset Information
  title: "Marine eDNA sequences from [LOCATION] [TIMEFRAME]" # title: " " leave defaults blank
  title_source_field: "project_name"
  abstract: |
    Brief description of your dataset. Include what organisms were studied,
    where samples were collected, what methods were used, and the purpose of the study.
    This should help users understand the fitness-for-use of your data.

  # Dataset identifiers and publication info
  publication_date: "2024"  # YYYY or YYYY-MM-DD format
  language: "en"  # ISO language code (en for English)

  # People and Organizations (at least contact is required)
  contact:
    individual_name:
      given_name: "Your First"
      surname: "Your Last"
    organization_name: "Your Institution" # recommended field: institution
    # Optional: set to a column name in projectMetadata to pull organization automatically
    organization_source_field: "institutionID"
    position_name: ""  # Alternative to individual name (e.g., "Data Manager")
    email: "your.email@institution.edu"
    phone: ""
    # Nested address fields (not a "- " list): one key per line below.
    address:
      delivery_point: "123 University Ave"
      city: "Your City"
      administrative_area: "State/Province"
      postal_code: "12345"
      country: "United States"
    online_url: ""  # Personal or institutional website
    user_id: ""  # ORCID (e.g., "https://orcid.org/0000-0000-0000-0000")

  creator:
    individual_name:
      given_name: "Principal First"
      surname: "Principal Last"
    organization_name: "Research Institution"
    # Optional: set to a column name in projectMetadata to pull organization automatically
    organization_source_field: "institutionID"
    position_name: ""
    email: "pi@institution.edu"
    phone: ""
    # Nested address fields (not a "- " list): one key per line below.
    address:
      delivery_point: "456 Science Blvd"
      city: "Research City"
      administrative_area: "State/Province"
      postal_code: "54321"
      country: "United States"
    online_url: ""
    user_id: ""  # ORCID

  # Optional metadata provider (if different from creator)
  metadata_provider:
    individual_name:
      given_name: ""
      surname: ""
    organization_name: ""
    email: ""

  # Associated parties (additional contributors)
  # Repeatable list: [] = none yet. To add people, use "- " entries like the commented example (same "- " pattern as classifications, personnel, method_steps, bibliography).
  associated_parties: []
    # Example entry:
    # - individual_name:
    #     given_name: "Collaborator First"
    #     surname: "Collaborator Last"
    #   organization_name: "Partner Institution"
    #   email: "collab@partner.edu"
    #   role: "principal investigator"  # Options: originator, content provider, custodian, owner, point of contact, principal investigator

  # Coverage Information
  geographic_coverage:
    description: "Geographic area description (e.g., 'Gulf of Mexico', 'North Atlantic')" # Consider summarizing sampleMetadata.locality or waterBody
    # Optional: configure preferred source columns in occurrence for description (in order)
    # List of field names (each line is "- \"column\""):
    description_source_fields:
      - "locality"
      - "waterBody"
    bounding_coordinates:
      west: -95.0   # Decimal degrees
      east: -80.0
      north: 30.0
      south: 25.0 # TODO: GUI calculates these, grab from actual data
    # Optional: customize occurrence latitude/longitude field names
    latitude_field: "decimalLatitude"
    longitude_field: "decimalLongitude"

  temporal_coverage:
    # The begin_date and end_date are now automatically calculated from the eventDate column.
    # Optional: customize occurrence date column name if it's not 'eventDate'.
    event_date_field: "eventDate"

  taxonomic_coverage:
    general_description: "Marine organisms identified through eDNA metabarcoding"
    # Repeatable list (same "- " pattern as associated_parties): [] or uncomment/build "- " blocks from the example.
    classifications: []
      # Example entries:
      # - taxon_rank_name: "kingdom"
      #   taxon_rank_value: "Animalia"
      #   common_name: "Animals"
      # - taxon_rank_name: "phylum"
      #   taxon_rank_value: "Chordata"
      #   common_name: "Vertebrates"
    # Optional: configure preferred occurrence rank fields for taxonomic coverage
    rank_fields:
      - "kingdom"
      - "phylum"
      - "class"
      - "order"

  # Keywords for discoverability
  # Already in "list" form: each keyword is a "- keyword:" block. Add more by copying a full block (dash + nested lines).
  keywords:
    #   - sampleMetadata: env_broad_scale, env_local_scale, env_medium, waterBody
    #   - projectMetadata: target_gene, target_subfragment, instrument, lib_layout, ampliconSize
    # Example placeholders (uncomment and fill as needed):
    # - keyword: "<env_broad_scale>"
    # - keyword: "<env_local_scale>"
    # - keyword: "<env_medium>"
    # - keyword: "<waterBody>"
    # - keyword: "<target_gene>"
    # - keyword: "<target_subfragment>"
    # - keyword: "<instrument>"
    # - keyword: "<lib_layout>"
    # - keyword: "<ampliconSize>"
    - keyword: "eDNA"
      thesaurus: "ASFA"
    - keyword: "metabarcoding"
      thesaurus: "ASFA"
    - keyword: "marine biodiversity"
      thesaurus: "ASFA"
    - keyword: "environmental DNA"
      thesaurus: "GCMD"

  # Project Information
  project:
    title: "Your Project Title" # Leave as-is to auto-fill from your metadata
    # Optional: customize which projectMetadata column should auto-fill project title
    title_source_field: "project_id"
    # TODO:
    description: |
      Description of the research project under which this dataset was collected.
      Include objectives, hypotheses, and broader context.
    funding: |
      Information about funding sources, grant numbers, etc.
      Example: "This work was supported by NOAA Grant #12345"
    # Repeatable list (same "- " pattern as associated_parties).
    personnel: []
      # Example entry:
      # - individual_name:
      #     given_name: "PI First"
      #     surname: "PI Last"
      #   role: "principal investigator"
      #   email: "pi@institution.edu"

  # Methods and Sampling
  methods:
    study_extent: |
      Description of the specific sampling area and frequency.
      Example: "Samples were collected monthly from 5 stations in the Gulf of Mexico from January to December 2020."

    sampling_description: |
      Detailed description of sampling procedures, similar to methods section of a journal article.
      Include collection methods, equipment used, sample processing, etc.

    # Repeatable list (same "- " pattern): each step is one "- description:" block; use | under description for long text.
    method_steps: []
      # Example entries:
      # - description: |
      #     Water samples were collected using Niskin bottles at depths of 0, 10, and 50 meters.
      #     Samples were filtered through 0.22μm filters and stored at -80°C until processing.
      # - description: |
      #     DNA was extracted using the DNeasy PowerSoil Kit following manufacturer protocols.
      #     PCR amplification targeted the 16S rRNA gene using primers 515F and 806R.

    quality_control: |
      Description of quality control measures taken during sample collection,
      processing, and analysis.

  # Intellectual Property and Usage Rights
  # TIP: If you track a license in projectMetadata.license, mirror it here
  license: "CC0"  # Options: CC0, CC-BY, CC-BY-NC
  purpose: |
    A description of the purpose of this dataset.
    Why was it collected? What questions does it aim to answer?

  # Citations and References
  # TIP: Paste projectMetadata.bibliographicCitation here (or customize)
  # To rely on auto-generated citation text: use "" on one line instead of | (see header: Leaving a field blank).
  dataset_citation: |
    How users should cite this dataset. Can be auto-generated or custom.
    Leave blank for auto-generation based on creator, title, etc.

  # Repeatable list (same "- " pattern): each reference is one "- \"citation string\"" line.
  bibliography: []
    # Example entries (publications related to this dataset):
    # - "Smith, J. et al. (2020). Marine biodiversity patterns. Journal of Marine Science. DOI: 10.1000/example"
    # - "Jones, A. (2019). eDNA methods handbook. Marine Methods Press."

  # Additional Information
  # Multi-line text (same as abstract:). To leave blank / omit from EML: use "" instead of | (see header: Leaving a field blank).
  # If you switch this to [], delete the indented lines below—do not leave stray text under [].
  additional_info: |
    Any other relevant information about the dataset that doesn't fit in other sections.

  # Collection Information (only if museum specimens are involved)
  # Single record (not a repeatable "- list"): four fixed keys. Different from associated_parties / method_steps.
  collection:
    name: ""
    identifier: ""
    parent_collection_identifier: ""
    specimen_preservation_method: ""
